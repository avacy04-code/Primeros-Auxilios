<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misión Primeros Auxilios · Pantalla dividida</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="cabecera">
      <h1>🚑 MISIÓN PRIMEROS AUXILIOS</h1>
      <p class="subtitulo">Pantalla dividida por equipos · retos y preguntas simultáneos</p>
    </header>

    <section class="panel" id="panelInicio">
      <h2>Configurar partida</h2>

      <div class="config-grid">
        <label for="numeroEquipos">Número de equipos</label>
        <input type="number" id="numeroEquipos" min="2" max="12" value="4" />
        <button class="btn principal" type="button" onclick="generarCamposEquipos()">Generar equipos</button>
      </div>

      <div id="camposEquipos" class="campos-equipos"></div>

      <div class="acciones">
        <button class="btn principal grande" onclick="iniciarPartida()">▶️ Empezar partida</button>
      </div>
    </section>

    <section class="panel oculto" id="panelJuego">
      <div class="barra-superior">
        <div class="info-box">
          <span class="etiqueta">Tiempo total</span>
          <span id="tiempoTotal">15:00</span>
        </div>
        <div class="info-box">
          <span class="etiqueta">Rondas máximas</span>
          <span id="maxRondasTexto">10</span>
        </div>
        <div class="info-box">
          <span class="etiqueta">Equipos</span>
          <span id="totalEquiposTexto">0</span>
        </div>
      </div>

      <div class="zona-principal">
        <main>
          <div id="tableroEquipos" class="tablero-equipos"></div>
        </main>

        <aside class="lateral">
          <div class="bloque">
            <h3>🏆 Ranking general</h3>
            <div id="ranking"></div>
          </div>

          <div class="bloque">
            <h3>📊 Estado de equipos</h3>
            <div id="estadoGeneral"></div>
          </div>
        </aside>
      </div>
    </section>

    <section class="panel oculto" id="panelFinal">
      <h2>🏁 Clasificación final</h2>
      <div id="podioFinal" class="podio"></div>
      <div class="acciones">
        <button class="btn principal grande" onclick="reiniciarJuego()">🔁 Nueva partida</button>
      </div>
    </section>
  </div>

  <script src="datos.js"></script>
  <script src="ruleta.js"></script>
  <script src="sonidos.js"></script>
  <script src="script.js"></script>
</body>
</html>
