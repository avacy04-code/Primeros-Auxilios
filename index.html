<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Misión Primeros Auxilios 4.1 PRO+</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- FLASH -->
<div id="flashAcierto" class="flash flash-acierto oculto"></div>
<div id="flashError" class="flash flash-error oculto"></div>

<!-- CONFETI -->
<canvas id="confetiCanvas"></canvas>

<!-- PANTALLA TURNO -->
<div id="pantallaTurno" class="pantalla-turno oculto">
  <h1 id="turnoEquipoNombre"></h1>
</div>

<!-- RESUMEN -->
<div id="pantallaResumen" class="pantalla-resumen oculto">
  <h2 id="resumenEquipo"></h2>
  <p id="resumenPuntos"></p>
</div>

<div class="app">

  <div id="panelInicio">
    <h2>Configurar equipos</h2>
    <input id="numeroEquipos" type="number" value="3">
    <button onclick="generarCamposEquipos()">Crear</button>
    <div id="camposEquipos"></div>
    <button onclick="iniciarPartida()">JUGAR</button>
  </div>

  <div id="panelJuego" class="oculto">

    <h2 id="equipoActualTexto"></h2>

    <div id="contenidoActual"></div>

    <div id="botonesRespuesta"></div>

    <div id="botonesReto">
      <button onclick="superarReto()">Reto superado</button>
    </div>

    <div id="comodinesBox">
      <button onclick="usarDoble()">x2</button>
      <button onclick="usarCongelar()">⏸</button>
      <button onclick="usarPasar()">⏭</button>
      <button onclick="usar50()">50%</button>
    </div>

    <p id="mensajeTurno"></p>

  </div>

  <div id="panelFinal" class="oculto">
    <h1 id="ganadorFinal"></h1>
  </div>

</div>

<script src="datos.js"></script>
<script src="sonidos.js"></script>
<script src="script.js"></script>

</body>
</html>
