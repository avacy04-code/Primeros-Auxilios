<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚑 Misión Primeros Auxilios · PRO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <header class="hero">
    <div class="hero-overlay">
      <h1>🚑 MISIÓN PRIMEROS AUXILIOS</h1>
      <p class="subtitulo">Versión PRO · Turnos · 1 reto + 5 preguntas</p>
    </div>
  </header>

  <!-- CONFIG -->
  <section class="panel" id="panelInicio">
    <h2>⚙️ Configuración</h2>

    <div class="config-grid">
      <label>Nº equipos</label>
      <input type="number" id="numeroEquipos" min="2" max="12" value="4">
      <button class="btn principal" onclick="generarCamposEquipos()">Generar</button>
    </div>

    <div id="camposEquipos" class="campos-equipos"></div>

    <div class="acciones">
      <button class="btn principal grande" onclick="iniciarPartida()">▶️ Empezar</button>
    </div>
  </section>

  <!-- JUEGO -->
  <section class="panel oculto" id="panelJuego">

    <div class="barra-superior">
      <div class="info-box">
        <span>⏱</span>
        <span id="tiempoTotal">15:00</span>
      </div>

      <div class="info-box">
        <span>🔁</span>
        <span id="rondaActualTexto">1/10</span>
      </div>

      <div class="info-box">
        <span>👥</span>
        <span id="equipoActualTexto"></span>
      </div>

      <div class="info-box lider-box">
        <span>🥇</span>
        <span id="liderActual"></span>
      </div>
    </div>

    <section class="tarjeta-equipo">

      <h2 id="nombreEquipoTurno"></h2>

      <div id="contenidoActual"></div>

      <div class="barra-tiempo">
        <div id="barraTiempo" class="barra-tiempo-interna"></div>
      </div>

      <div id="botonesRespuesta"></div>

      <div id="botonesReto">
        <button class="btn principal" onclick="superarReto()">Reto superado</button>
      </div>

      <div id="comodinesBox">
        <button onclick="usarDoble()">x2</button>
        <button onclick="usarCongelar()">⏸</button>
        <button onclick="usarPasar()">⏭</button>
        <button onclick="usar50()">🎯50%</button>
      </div>

      <p id="mensajeTurno"></p>

    </section>

    <div id="ranking"></div>

  </section>

  <!-- FINAL -->
  <section class="panel oculto" id="panelFinal">
    <h2>🏁 FINAL</h2>
    <div id="ganadorFinal"></div>
  </section>

</div>

<script src="datos.js"></script>
<script src="sonidos.js"></script>
<script src="script.js"></script>

</body>
</html>
